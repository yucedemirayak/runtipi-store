version: '3.8'

services:
  pterodactyl-perms:
    container_name: pterodactyl-perms
    image: alpine:3.21
    restart: "no"
    network_mode: none
    command:
      - /bin/sh
      - -c
      - mkdir -p /var/lib/pterodactyl/volumes /var/lib/pterodactyl/archives /var/lib/pterodactyl/backups /tmp/pterodactyl /run/wings /run/wings/machine-id /run/wings/etc && chown 988:988 /var/lib/pterodactyl /var/lib/pterodactyl/volumes /var/lib/pterodactyl/archives /var/lib/pterodactyl/backups /tmp/pterodactyl /run/wings /run/wings/machine-id /run/wings/etc && chmod 755 /var/lib/pterodactyl /var/lib/pterodactyl/volumes /var/lib/pterodactyl/archives /var/lib/pterodactyl/backups /tmp/pterodactyl /run/wings /run/wings/machine-id /run/wings/etc && tail -f /dev/null
    volumes:
      - /var/lib/pterodactyl:/var/lib/pterodactyl
      - /tmp/pterodactyl:/tmp/pterodactyl
      - /run/wings:/run/wings

  pterodactyl-db:
    container_name: pterodactyl-db
    image: mariadb:11
    restart: unless-stopped
    networks:
      - tipi_main_network
    environment:
      - MYSQL_ROOT_PASSWORD=pterodactylpass
      - MYSQL_DATABASE=pterodactyl
      - MYSQL_USER=pterodactyl
      - MYSQL_PASSWORD=pterodactylpass
    volumes:
      - ${APP_DATA_DIR}/db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-upterodactyl", "-ppterodactylpass"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      runtipi.managed: true

  pterodactyl-redis:
    container_name: pterodactyl-redis
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - tipi_main_network
    volumes:
      - ${APP_DATA_DIR}/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      runtipi.managed: true

  pterodactyl:
    container_name: pterodactyl
    image: ghcr.io/pterodactyl/panel:latest
    entrypoint: ["/bin/sh", "/scripts/bootstrap.sh"]
    command: ["supervisord", "-n", "-c", "/etc/supervisord.conf"]
    restart: unless-stopped
    depends_on:
      pterodactyl-db:
        condition: service_healthy
      pterodactyl-redis:
        condition: service_healthy
    ports:
      - ${APP_PORT}:80
    networks:
      - tipi_main_network
    environment:
      - TZ=${TZ}
      - APP_URL=http://pterodactyl
      - APP_TIMEZONE=${TIPI_PTERODACTYL_APP_TIMEZONE}
      - APP_SERVICE_AUTHOR=admin@example.com
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_ENVIRONMENT_ONLY=false
      - TRUSTED_PROXIES=*
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - DB_CONNECTION=mysql
      - DB_HOST=pterodactyl-db
      - DB_PORT=3306
      - DB_DATABASE=pterodactyl
      - DB_USERNAME=pterodactyl
      - DB_PASSWORD=pterodactylpass
      - REDIS_HOST=pterodactyl-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD
      - PTERODACTYL_ADMIN_EMAIL=${TIPI_PTERODACTYL_ADMIN_EMAIL}
      - PTERODACTYL_ADMIN_USERNAME=${TIPI_PTERODACTYL_ADMIN_USERNAME}
      - PTERODACTYL_ADMIN_PASSWORD=${TIPI_PTERODACTYL_ADMIN_PASSWORD}
    volumes:
      - ${APP_DATA_DIR}/panel-var:/app/var
      - ${APP_DATA_DIR}/panel-logs:/app/storage/logs
      - ${APP_DATA_DIR}/panel-nginx:/etc/nginx/http.d
      - ${APP_DATA_DIR}/panel-certs:/etc/letsencrypt
      - ${ROOT_FOLDER_HOST}/apps/${APP_STORE_ID}/${APP_NAME}/scripts:/scripts:ro
      - ${APP_DATA_DIR}/wings-etc:/wings-config
    labels:
      traefik.enable: true
      traefik.http.middlewares.pterodactyl-web-redirect.redirectscheme.scheme: https
      traefik.http.services.pterodactyl.loadbalancer.server.port: 80
      traefik.http.routers.pterodactyl-insecure.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.pterodactyl-insecure.entrypoints: web
      traefik.http.routers.pterodactyl-insecure.service: pterodactyl
      traefik.http.routers.pterodactyl-insecure.middlewares: pterodactyl-web-redirect
      traefik.http.routers.pterodactyl.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.pterodactyl.entrypoints: websecure
      traefik.http.routers.pterodactyl.service: pterodactyl
      traefik.http.routers.pterodactyl.tls.certresolver: myresolver
      traefik.http.routers.pterodactyl-local-insecure.rule: Host(`pterodactyl.${LOCAL_DOMAIN}`)
      traefik.http.routers.pterodactyl-local-insecure.entrypoints: web
      traefik.http.routers.pterodactyl-local-insecure.service: pterodactyl
      traefik.http.routers.pterodactyl-local-insecure.middlewares: pterodactyl-web-redirect
      traefik.http.routers.pterodactyl-local.rule: Host(`pterodactyl.${LOCAL_DOMAIN}`)
      traefik.http.routers.pterodactyl-local.entrypoints: websecure
      traefik.http.routers.pterodactyl-local.service: pterodactyl
      traefik.http.routers.pterodactyl-local.tls: true
      runtipi.managed: true

  pterodactyl-wings:
    container_name: pterodactyl-wings
    image: ghcr.io/pterodactyl/wings:latest
    restart: unless-stopped
    depends_on:
      pterodactyl-perms:
        condition: service_started
    ports:
      - 8081:8080
      - 2022:2022
    networks:
      - tipi_main_network
    environment:
      - TZ=${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ${APP_DATA_DIR}/wings-etc:/etc/pterodactyl
      - /var/lib/pterodactyl:/var/lib/pterodactyl
      - ${APP_DATA_DIR}/wings-logs:/var/log/pterodactyl
      - /tmp/pterodactyl:/tmp/pterodactyl
      - /run/wings:/run/wings
    labels:
      runtipi.managed: true
