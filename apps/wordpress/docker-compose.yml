version: '3.8'
services:
  wordpress-db:
    container_name: wordpress-db
    image: mariadb:11.4
    restart: unless-stopped
    networks:
      - tipi_main_network
    environment:
      - TZ=${TZ}
      - MYSQL_ROOT_PASSWORD=wordpresspass
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=wordpress
      - MYSQL_PASSWORD=wordpresspass
    volumes:
      - ${APP_DATA_DIR}/db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uwordpress", "-pwordpresspass"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      runtipi.managed: true

  wordpress:
    container_name: wordpress
    image: wordpress:php8.3-apache
    restart: unless-stopped
    depends_on:
      wordpress-db:
        condition: service_healthy
    ports:
      - ${APP_PORT}:80
    networks:
      - tipi_main_network
    environment:
      - TZ=${TZ}
      - WORDPRESS_DB_HOST=wordpress-db:3306
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=wordpresspass
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_TABLE_PREFIX=${TIPI_WORDPRESS_TABLE_PREFIX}
      - WORDPRESS_DEBUG=${TIPI_WORDPRESS_DEBUG}
    volumes:
      - ${APP_DATA_DIR}/data:/var/www/html
    labels:
      traefik.enable: true
      traefik.http.middlewares.wordpress-web-redirect.redirectscheme.scheme: https
      traefik.http.services.wordpress.loadbalancer.server.port: 80
      traefik.http.routers.wordpress-insecure.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.wordpress-insecure.entrypoints: web
      traefik.http.routers.wordpress-insecure.service: wordpress
      traefik.http.routers.wordpress-insecure.middlewares: wordpress-web-redirect
      traefik.http.routers.wordpress.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.wordpress.entrypoints: websecure
      traefik.http.routers.wordpress.service: wordpress
      traefik.http.routers.wordpress.tls.certresolver: myresolver
      traefik.http.routers.wordpress-local-insecure.rule: Host(`wordpress.${LOCAL_DOMAIN}`)
      traefik.http.routers.wordpress-local-insecure.entrypoints: web
      traefik.http.routers.wordpress-local-insecure.service: wordpress
      traefik.http.routers.wordpress-local-insecure.middlewares: wordpress-web-redirect
      traefik.http.routers.wordpress-local.rule: Host(`wordpress.${LOCAL_DOMAIN}`)
      traefik.http.routers.wordpress-local.entrypoints: websecure
      traefik.http.routers.wordpress-local.service: wordpress
      traefik.http.routers.wordpress-local.tls: true
      runtipi.managed: true
